  # ---------------------------------------------------------------------------
  # wheel_license_extract: Runs after all wheel builds complete. Downloads the
  # per-Python-version scancode JSON files from COS (uploaded by each
  # wheel_build_pyXXX job) and runs extract_licenses.py against each one to
  # produce a comma-separated list of SPDX license identifiers.
  # ---------------------------------------------------------------------------
  wheel_license_extract:
    if: ${{ inputs.wheel_build == 'true' && (needs.wheel_build_py310.result == 'success' || needs.wheel_build_py311.result == 'success' || needs.wheel_build_py312.result == 'success' || needs.wheel_build_py313.result == 'success' || needs.wheel_build_py314.result == 'success') }}
    needs:
      - wheel_build_py310
      - wheel_build_py311
      - wheel_build_py312
      - wheel_build_py313
      - wheel_build_py314
    runs-on: ubuntu-24.04-ppc64le-p10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download package-cache
        uses: actions/download-artifact@v7
        with:
          name: package-cache

      - name: Extract package cache
        run: tar -xzf package-cache.tar.gz

      - name: Download scancode JSON outputs from COS
        env:
          GHA_CURRENCY_SERVICE_ID_API_KEY: ${{ secrets.GHA_CURRENCY_SERVICE_ID_API_KEY }}
        run: |
          source package-cache/variable.sh
          source package-cache/scanner-env.sh

          echo "Downloading per-version scancode archives from COS..."
          mkdir -p all_wheel_scancode

          chmod +x ./gha-script/download-scripts/download_file.sh
          for PY_VER in py310 py311 py312 py313 py314; do
            ARCHIVE="wheel_scancode_${PY_VER}.tar.gz"
            echo "Attempting to download $ARCHIVE..."
            bash ./gha-script/download-scripts/download_file.sh "$ARCHIVE" \
              || echo "Warning: $ARCHIVE not found on COS (skipped)"
            if [ -f "$ARCHIVE" ]; then
              tar -xzf "$ARCHIVE"
              find "wheel_scancode_${PY_VER}" -type f -name "*.json" \
                -exec cp {} all_wheel_scancode/ \; 2>/dev/null || true
              echo "Collected JSON files from $ARCHIVE"
            fi
          done

          echo "All scancode JSON files available:"
          ls -lh all_wheel_scancode

      - name: Extract licenses from each scancode JSON
        run: |
          echo "===== License extraction per wheel ====="
          for JSON_FILE in all_wheel_scancode/*.json; do
            [ -f "$JSON_FILE" ] || { echo "No JSON files found — skipping."; break; }
            echo "--- $JSON_FILE ---"
            python3 ./gha-script/licenses_extract_script.py "$JSON_FILE"
          done
          echo "========================================"

  
  source_scanner:
    needs: build
    if: ${{ inputs.validate_build_script == 'true' }}
    runs-on: ubuntu-24.04-ppc64le-p10
    steps:
      - uses: actions/checkout@v6

      - name: Download package-cache
        uses: actions/download-artifact@v7
        with:
          name: updated-package-cache

      - name: Extract package cache
        run: tar -xzf package-cache.tar.gz

      - name: Prepare scanner environment
        run: |
          echo "Sourcing variable.sh..."
          source package-cache/variable.sh
          source package-cache/scanner-env.sh
          echo "---------updated scanner-env.sh cat----------------"
          cat package-cache/scanner-env.sh
          echo "scanner-env.sh created with:"
          cat package-cache/scanner-env.sh

      - name: Run Trivy Scan
        if: ${{ inputs.enable_trivy == 'true' }}
        run: |
          echo ".................Sourcing variable.sh and scanner-env.sh...................."
          source package-cache/variable.sh
          source package-cache/scanner-env.sh
          cat package-cache/scanner-env.sh
                         
          chmod +x ./gha-script/scanner-scripts/trivy_code_scan.sh
          bash ./gha-script/scanner-scripts/trivy_code_scan.sh;
          mkdir source_trivy
          mv package-cache/trivy_source_vulnerabilities_results.json package-cache/trivy_source_sbom_results.cyclonedx source_trivy

      - name: Run Syft Scan
        if: ${{ inputs.enable_syft == 'true' }}
        run: |
          echo ".................Sourcing variable.sh and scanner-env.sh...................."
          source package-cache/variable.sh
          source package-cache/scanner-env.sh
          chmod +x ./gha-script/scanner-scripts/syft_code_scan.sh
          bash ./gha-script/scanner-scripts/syft_code_scan.sh
          mkdir source_syft
          mv package-cache/syft_source_sbom_results.json source_syft

      - name: Run Grype Scan
        if: ${{ inputs.enable_grype == 'true' }}
        run: |
          echo ".................Sourcing variable.sh and scanner-env.sh...................."
          source package-cache/variable.sh
          source package-cache/scanner-env.sh
          chmod +x ./gha-script/scanner-scripts/grype_code_scan.sh
          bash ./gha-script/scanner-scripts/grype_code_scan.sh
          mkdir source_grype
          mv package-cache/grype_source_sbom_results.json package-cache/grype_source_vulnerabilities_results.json source_grype

      - name: Upload Scanner Results
        env:
           GHA_CURRENCY_SERVICE_ID_API_KEY: ${{ secrets.GHA_CURRENCY_SERVICE_ID_API_KEY }}
        run: |
          mkdir source
          source package-cache/variable.sh
          source package-cache/scanner-env.sh
          find source_trivy -mindepth 1 -exec mv -t source {} + 2>/dev/null || true
          find source_syft -mindepth 1 -exec mv -t source {} + 2>/dev/null || true
          find source_grype -mindepth 1 -exec mv -t source {} + 2>/dev/null || true
          tar cvzf source_scanner.tar.gz source
          chmod +x ./gha-script/upload-scripts/upload_file.sh
          bash ./gha-script/upload-scripts/upload_file.sh source_scanner.tar.gz

