name: Currency Build
on:
  workflow_dispatch:
    branches:
      - master

    inputs:
      package_name:
        description: 'Name of the package to build'
        required: true
      version:
        description: 'Version of the package'
        required: true
      validate_build_script:
        description: 'Run build validation script'
        required: true
        default: 'false'
      wheel_build:
        description: 'Create wheel for different Python versions'
        required: true
        default: 'false'
      build_docker:
        description: 'Build docker image'
        required: true
        default: 'false'
      enable_trivy:
        description: 'Enable Trivy scan'
        required: true
        default: 'true'
      enable_syft:
        description: 'Enable Syft scan'
        required: true
        default: 'true'
      enable_grype:
        description: 'Enable Grype scan'
        required: true
        default: 'true'
      unique_id:
        description: 'Unique ID for the build'
        required: false
        default: 'None'
      large-runner-label:
        description: "New runner to use for failing build"
        required: false
        type: choice
        options:
          - ''
          - ubuntu-24.04-ppc64le-2xlarge-p10
          - ubuntu-24.04-ppc64le-4xlarge-p10

run-name: >
  ${{ inputs.large-runner-label != '' &&
      format('Retriggered Currency Build for package {0} and Unique ID {1} on {2}', inputs.package_name, inputs.unique_id, inputs.large-runner-label) ||
      format('Currency Build {0} && Unique ID {1}', inputs.package_name, inputs.unique_id)
  }}


jobs:
  build_info:
    runs-on: ubuntu-24.04-ppc64le-p10
    env:
      PACKAGE_NAME: ${{ inputs.package_name }}
      VERSION: ${{ inputs.version }}
      VALIDATE_BUILD_SCRIPT: ${{ inputs.validate_build_script }}
      WHEEL_BUILD: ${{ inputs.wheel_build }}
      build_docker: ${{ inputs.build_docker }}
      ENABLE_TRIVY: ${{ inputs.enable_trivy }}
      ENABLE_SYFT: ${{ inputs.enable_syft }}
      ENABLE_GRYPE: ${{ inputs.enable_grype }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install system packages
        run: |
          sudo apt update -y
          sudo apt install -y jq file
          
      - name: Install Python dependencies
        run: |
          pip3 install --force-reinstall -v "requests==2.31.0"
          pip3 install --upgrade docker

      - name: Get Build Info and Save Variables
        run: |
          chmod +x ./gha-script/read_buildinfo.sh
          bash ./gha-script/read_buildinfo.sh

      - name: Show contents of variable.sh
        run: |
          echo "===== variable.sh ====="
          cat variable.sh
          echo "======================="

      - name: Create scanner-env.sh
        run: |
          echo "Creating package-cache........."
          mkdir package-cache
          echo "Creating scanner-env.sh ......."
          echo "export VALIDATE_BUILD_SCRIPT='${{ inputs.validate_build_script }}'" > scanner-env.sh
          echo "export BUILD_DOCKER='${{ inputs.build_docker }}'" >> scanner-env.sh
          echo "export PACKAGE_NAME='${{ inputs.package_name }}'" >> scanner-env.sh         
          echo "===== scanner-env.sh ====="
          cat scanner-env.sh
          echo "=========================="
          echo "Moving scanner-env.sh and variable.sh into package-cache............"
          sudo mv variable.sh package-cache
          sudo mv scanner-env.sh package-cache
          echo "Moved scanner-env.sh and variable.sh into package-cache............"

      - name: Archive package cache
        run: tar -czf package-cache.tar.gz package-cache/

      - name: Upload variable.sh and scanner-env.sh via package-cache
        uses: actions/upload-artifact@v6
        with:
          name: package-cache
          path: package-cache.tar.gz

  # ---------------------------------------------------------------------------
  # install_scan_tools: Installs grype ONCE (static Go binary — fully portable)
  # and caches it as an artifact for all wheel_build_pyXXX jobs.
  # Scancode-toolkit is installed fresh per wheel_build job using pip cache
  # (Option 1) — pip downloads are cached so reinstall is fast.
  # ---------------------------------------------------------------------------
  install_scan_tools:
    needs: build_info
    if: ${{ inputs.wheel_build == 'true' }}
    runs-on: ubuntu-24.04-ppc64le-p10
    steps:
      - name: Install system dependencies
        run: |
          sudo apt update -y
          sudo apt install -y wget curl tar jq

      - name: Install grype
        run: |
          GRYPE_VERSION=$(curl -s --retry 3 https://api.github.com/repos/anchore/grype/releases/latest | jq -r '.tag_name')
          echo "Installing grype $GRYPE_VERSION for ppc64le..."
          wget --tries=3 https://github.com/anchore/grype/releases/download/$GRYPE_VERSION/grype_${GRYPE_VERSION#v}_linux_ppc64le.tar.gz
          tar -xzf grype_${GRYPE_VERSION#v}_linux_ppc64le.tar.gz
          mkdir -p scan-tools-bin
          mv grype scan-tools-bin/grype
          chmod +x scan-tools-bin/grype
          echo "Grype version:"
          scan-tools-bin/grype version

      - name: Archive grype binary
        run: tar -czf scan-tools-cache.tar.gz scan-tools-bin/

      - name: Upload scan-tools-cache artifact
        uses: actions/upload-artifact@v6
        with:
          name: scan-tools-cache
          path: scan-tools-cache.tar.gz

        
  build:
    needs: build_info
    if: ${{ inputs.validate_build_script == 'true' }}
    runs-on: ${{ inputs.large-runner-label != '' && inputs.large-runner-label || 'ubuntu-24.04-ppc64le-p10' }}
    steps:
      - uses: actions/checkout@v6

      - name: Download package-cache
        uses: actions/download-artifact@v7
        with:
          name: package-cache
      
      - name: Extract package cache
        run: tar -xzf package-cache.tar.gz

      - name: Build Package
        env:
          GHA_CURRENCY_SERVICE_ID_API_KEY: ${{ secrets.GHA_CURRENCY_SERVICE_ID_API_KEY }}
        run: |
          echo "Sourcing variable.sh and scanner-env.sh..........................................."
          source package-cache/variable.sh
          source package-cache/scanner-env.sh
          echo "===== variable.sh ====="
          cat package-cache/variable.sh
          echo "===== scanner-env.sh ====="
          cat package-cache/scanner-env.sh
          echo "==============LSCPU================"
          lscpu
          echo "==================================="
          chmod +x ./gha-script/build_package.sh
          bash ./gha-script/build_package.sh
          cloned_package=$(ls -td -- */ | head -n 1)
          sudo mv "$cloned_package" package-cache
          echo "export CLONED_PACKAGE=\"$cloned_package\"" >> package-cache/scanner-env.sh
          echo "-------------updated scanner-env.sh-----------------------"
          cat  package-cache/scanner-env.sh
          echo "---------------------------------------------"
          cd package-cache
          sudo chown $USER:$USER -R .
          chmod +x ../gha-script/pre_process.sh
          bash ../gha-script/pre_process.sh
          cd $GITHUB_WORKSPACE
          gzip build_log
          chmod +x ./gha-script/upload-scripts/upload_file.sh
          bash ./gha-script/upload-scripts/upload_file.sh build_log.gz

      - name: Fix permissions on package-cache
        run: |
          USER=$(whoami)
          echo "Current user: $USER"
          echo "Fixing ownership and permissions for package-cache"
          sudo chown -R $USER:$USER package-cache
          sudo chmod -R u+rwX,go+rX,go-w package-cache
          
      - name: Archive updated package cache
        run: tar -czf package-cache.tar.gz package-cache/

      - name: Upload updated package-cache
        uses: actions/upload-artifact@v6
        with:
          name: updated-package-cache
          path: package-cache.tar.gz

          
  # ---------------------------------------------------------------------------
  # wheel_build_pyXXX jobs: build wheel → run scancode scan → run grype scan →
  # upload scan results to COS → upload wheel to COS (only if scans pass).
  # Grype is reused from the install_scan_tools artifact (static binary).
  # Scancode is installed fresh per job via git clone; pip download cache
  # (actions/cache on ~/.cache/pip) makes reinstalls fast after the first run.
  # ---------------------------------------------------------------------------

  wheel_build_py310:
    needs:
      - build_info
      - install_scan_tools
    if: ${{ inputs.wheel_build == 'true' }}
    runs-on: ${{ inputs.large-runner-label != '' && inputs.large-runner-label || 'ubuntu-24.04-ppc64le-p10' }}
    env:
      GHA_CURRENCY_SERVICE_ID_API_KEY: ${{ secrets.GHA_CURRENCY_SERVICE_ID_API_KEY }}
      GHA_CURRENCY_SERVICE_ID: ${{ secrets.GHA_CURRENCY_SERVICE_ID }}
      PYTHON_VERSION: "3.10"
      PACKAGE_NAME: ${{ inputs.package_name }}
      VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt update -y

      - name: Download package-cache
        uses: actions/download-artifact@v7
        with:
          name: package-cache

      - name: Extract package cache
        run: tar -xzf package-cache.tar.gz

      - name: Download scan-tools-cache
        uses: actions/download-artifact@v7
        with:
          name: scan-tools-cache

      - name: Extract scan tools
        run: |
          tar -xzf scan-tools-cache.tar.gz
          echo "$GITHUB_WORKSPACE/scan-tools-bin" >> $GITHUB_PATH

      - name: Cache pip downloads for scancode-toolkit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: scancode-pip-ppc64le-v32.4.0

      - name: Run build_wheels.sh
        run: |
          ls
          echo "---------------------updated cache-----------------------"
          ls package-cache
          chmod +x package-cache/variable.sh
          chmod +x package-cache/scanner-env.sh
          source package-cache/variable.sh
          source package-cache/scanner-env.sh
        
          pwd
          ls -lh
          chmod +x ./gha-script/build_wheels.sh
          bash ./gha-script/build_wheels.sh

          WORKSPACE=$(pwd)
          
          # Use wheel name for log naming
          WHEEL_FILE=$(ls "$WORKSPACE"/*.whl | head -n 1)
          WHEEL_BASE=$(basename "${WHEEL_FILE%.whl}")
          LOG_NAME="${WHEEL_BASE}_py310_log.gz"

          # Compress and rename the log file
          gzip "$WORKSPACE/wheel_build_log"
          mv "$WORKSPACE/wheel_build_log.gz" "$WORKSPACE/$LOG_NAME"

          chmod +x ./gha-script/upload-scripts/upload_file.sh
          bash ./gha-script/upload-scripts/upload_file.sh $LOG_NAME

      - name: Run scancode scan on wheel
        run: |
          source package-cache/variable.sh
          source package-cache/scanner-env.sh
          chmod +x ./gha-script/scanner-scripts/scancode_wheel_scan.sh
          bash ./gha-script/scanner-scripts/scancode_wheel_scan.sh
          echo "-------------------------scancode outputs-----------------------------------------"
          ls *.json 2>/dev/null || echo "No JSON output files yet"

      - name: Run grype scan on wheel
        run: |
          source package-cache/variable.sh
          source package-cache/scanner-env.sh
          export GRYPE_BIN="$GITHUB_WORKSPACE/scan-tools-bin/grype"
          chmod +x ./gha-script/scanner-scripts/grype_wheel_scan.sh
          bash ./gha-script/scanner-scripts/grype_wheel_scan.sh
          echo "-------------------------grype outputs-----------------------------------------"
          ls *.json 2>/dev/null || echo "No JSON output files yet"

      - name: Collect and upload wheel scan results to COS
        run: |
          source package-cache/variable.sh
          source package-cache/scanner-env.sh

          mkdir -p wheel_scancode_py310
          find . -maxdepth 1 -type f -name "*_output.json" ! -name "*_grype_output.json" -exec cp {} wheel_scancode_py310/ \;
          echo "Scancode outputs:"
          ls -lh wheel_scancode_py310

          tar cvzf wheel_scancode_py310.tar.gz wheel_scancode_py310
          chmod +x ./gha-script/upload-scripts/upload_file.sh
          bash ./gha-script/upload-scripts/upload_file.sh wheel_scancode_py310.tar.gz

          mkdir -p grype_wheel_py310
          find . -maxdepth 1 -type f -name "*_grype_output.json" -exec cp {} grype_wheel_py310/ \;
          echo "Grype outputs:"
          ls -lh grype_wheel_py310

          tar cvzf grype_wheel_py310.tar.gz grype_wheel_py310
          bash ./gha-script/upload-scripts/upload_file.sh grype_wheel_py310.tar.gz

      - name: Upload wheel to COS
        run: |
          if ls *.whl 1> /dev/null 2>&1; then
            sudo chmod a+r *.whl
            WHEEL_FILE=$(ls *.whl)
            SHA256_VALUE=$(cat sha256.sha)
            chmod +x ./gha-script/upload-scripts/upload_wheel.sh
            bash ./gha-script/upload-scripts/upload_wheel.sh $WHEEL_FILE $SHA256_VALUE
          else
            echo "No wheel file found!"
            exit 1
          fi

