  build_docker:
    needs: build_info
    if: needs.build_info.outputs.docker_build_enabled == 'true'
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-24.04-ppc64le-p10' || inputs.large-runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Download package-cache
        uses: actions/download-artifact@v7
        with:
          name: package-cache

      - name: Extract package cache
        run: tar -xzf package-cache.tar.gz

      - name: Build Docker Image
        run: |
          echo "===== Sourcing environment ====="
          ls package-cache

          chmod +x package-cache/variable.sh
          chmod +x package-cache/scanner-env.sh
          source package-cache/variable.sh
          source package-cache/scanner-env.sh

          BUILD_DOCKER=$(echo "$BUILD_DOCKER" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
          DOCKERFILE_CHANGED=$(echo "$CHANGED_FILES" | grep -i 'Dockerfile' || true)

          if [[ "$BUILD_DOCKER" != "true" ]]; then
            echo "Skipping Docker build as BUILD_DOCKER=$BUILD_DOCKER"
            exit 0
          fi

          if [[ -z "$DOCKERFILE_CHANGED" ]]; then
            echo "Skipping Docker build as no Dockerfile changes detected in PR"
            exit 0
          fi

          echo "Dockerfile change detected, proceeding with build..."

          echo "===== Starting Docker build ====="
          sudo chown -R $USER:$USER .
          chmod +x ./gha-script/build_docker.sh
          bash ./gha-script/build_docker.sh

          echo "===== Docker images after build ====="
          docker images

          echo "===== Saving Docker image ====="
          docker save -o package-cache/image.tar "$IMAGE_NAME"

          ls -lh package-cache/image.tar
