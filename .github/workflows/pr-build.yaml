name: PR build

on:
  pull_request:
    branches:
      - master
      - replica-master
      
  workflow_dispatch:
    inputs:
      large-runner:
        description: "New runner to use for failing build"
        required: true
        default: "ubuntu-24.04-ppc64le-2xlarge-p10"
        type: choice
        options:
          - ubuntu-24.04-ppc64le-2xlarge-p10
          - ubuntu-24.04-ppc64le-4xlarge-p10
      pr_number:
        description: "PR number of failing build"
        required: true
        type: string

run-name: >
  ${{ github.event_name == 'workflow_dispatch'
      && format('Retriggered build on {0} for PR {1}', inputs.large-runner, inputs.pr_number)
      || github.event.pull_request.title }}

# ===================== ANCHORS =====================
x-wheel-job: &wheel-job
  needs: build_info
  runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-24.04-ppc64le-p10' || inputs.large-runner }}

x-wheel-env: &wheel-env
  GHA_CURRENCY_SERVICE_ID_API_KEY: ${{ secrets.GHA_CURRENCY_SERVICE_ID_API_KEY }}
  GHA_CURRENCY_SERVICE_ID: ${{ secrets.GHA_CURRENCY_SERVICE_ID }}
  PACKAGE_NAME: ${{ env.PACKAGE_NAME }}
  VERSION: ${{ env.VERSION }}

x-wheel-steps: &wheel-steps
  - name: Checkout code
    uses: actions/checkout@v6
    with:
      fetch-depth: 0

  - name: Install system dependencies
    run: sudo apt update -y

  - name: Download package-cache
    uses: actions/download-artifact@v7
    with:
      name: package-cache

  - name: Extract package cache
    run: tar -xzf package-cache.tar.gz

  - name: Run build_wheels.sh
    run: |
      ls
      echo "---------------------updated cache-----------------------"
      ls package-cache

      chmod +x package-cache/variable.sh
      chmod +x package-cache/scanner-env.sh
      source package-cache/variable.sh
      source package-cache/scanner-env.sh

      chmod +x ./gha-script/build_wheels.sh
      bash ./gha-script/build_wheels.sh

      WORKSPACE=$(pwd)
      LOG_NAME="${PACKAGE_NAME}_${VERSION}_wheel_py${PYTHON_VERSION}_log.gz"

      if [ -f "$WORKSPACE/wheel_build_log" ]; then
        gzip "$WORKSPACE/wheel_build_log"
        mv "$WORKSPACE/wheel_build_log.gz" "$WORKSPACE/$LOG_NAME"
      else
        echo "Wheel build completed for ${PACKAGE_NAME} ${VERSION} on Python ${PYTHON_VERSION}" \
          > "$WORKSPACE/${PACKAGE_NAME}_${VERSION}_wheel_py${PYTHON_VERSION}_log"
        gzip "$WORKSPACE/${PACKAGE_NAME}_${VERSION}_wheel_py${PYTHON_VERSION}_log"
        LOG_NAME="${PACKAGE_NAME}_${VERSION}_wheel_py${PYTHON_VERSION}_log.gz"
      fi

      chmod +x ./gha-script/upload-scripts/upload_file.sh
      bash ./gha-script/upload-scripts/upload_file.sh $LOG_NAME

  - name: Upload wheel artifact
    run: |
      if ls *.whl 1> /dev/null 2>&1; then
        sudo chmod a+r *.whl
        WHEEL_FILE=$(ls *.whl)
        SHA256_VALUE=$(cat sha256.sha)
        chmod +x ./gha-script/upload-scripts/upload_wheel.sh
        bash ./gha-script/upload-scripts/upload_wheel.sh $WHEEL_FILE $SHA256_VALUE
      else
        echo "No wheel file found!"
        exit 1
      fi

# ===================== JOBS =====================
jobs:

  build_info:
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-24.04-ppc64le-p10' || inputs.large-runner }}

    steps:
      - name: Checkout code (Pull Request)
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v6
        with:
             repository: ${{ github.event.pull_request.head.repo.full_name }}
             ref: ${{ github.event.pull_request.head.ref }}
             fetch-depth: 0

      - name: Checkout code (Workflow Dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ inputs.pr_number }}/head

      - name: Install required packages
        run: |
          sudo apt update -y
          sudo apt-get install -y file jq

      - name: Install Python dependencies
        run: |
          pip3 install --force-reinstall -v "requests==2.31.0"
          pip3 install --upgrade docker

      - name: Set PR number
        run: echo "PR_NUMBER=${{ github.event.pull_request.number || inputs.pr_number }}" >> $GITHUB_ENV

      - name: Run validate_builds.py
        run: |
          python3 -u gha-script/validate_builds.py ${PR_NUMBER:-false}

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }} --depth=1

      - name: Locate and parse build_info.json
        run: |
          BUILD_INFO_FILE=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep 'build_info.json' | head -n 1)

          if [ -z "$BUILD_INFO_FILE" ]; then
            echo "build_info.json not found!"
            exit 1
          fi

          PACKAGE_NAME=$(jq -r '.package_name // ""' $BUILD_INFO_FILE)
          VERSION=$(jq -r '.version // ""' $BUILD_INFO_FILE)

          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "BUILD_INFO_FILE=$BUILD_INFO_FILE" >> $GITHUB_ENV

      - name: Read build_info.json
        run: |
          chmod +x ./gha-script/read_buildinfo.sh
          bash ./gha-script/read_buildinfo.sh

      - name: Create scanner-env.sh
        run: |
          mkdir -p package-cache
          PACKAGE_DIR=$(jq -r '.package_dir // ""' $BUILD_INFO_FILE)
          WHEEL_BUILD=$(jq -r '.wheel_build // "false"' $BUILD_INFO_FILE)

          cat <<EOF > package-cache/scanner-env.sh
          export PACKAGE_NAME=$PACKAGE_NAME
          export VERSION=$VERSION
          export PACKAGE_DIR=$PACKAGE_DIR
          export WHEEL_BUILD=$WHEEL_BUILD
          EOF

          mv variable.sh package-cache/

      - name: Archive package cache
        run: tar -czf package-cache.tar.gz package-cache/

      - name: Upload package cache
        uses: actions/upload-artifact@v6
        with:
           name: package-cache
           path: package-cache.tar.gz

  build:
    needs: build_info
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-24.04-ppc64le-p10' || inputs.large-runner }}

    steps:
      - uses: actions/checkout@v6

      - name: Download package-cache
        uses: actions/download-artifact@v7
        with:
          name: package-cache

      - name: Extract package cache
        run: tar -xzf package-cache.tar.gz

      - name: Build Package
        run: |
          source package-cache/variable.sh
          source package-cache/scanner-env.sh

          chmod +x ./gha-script/build_package.sh
          bash ./gha-script/build_package.sh

# ===================== WHEEL JOBS =====================

  wheel_build_py39:
    <<: *wheel-job
    if: ${{ env.WHEEL_BUILD == 'true' }}
    continue-on-error: true
    env:
      <<: *wheel-env
      PYTHON_VERSION: "3.9"
    steps: *wheel-steps

  wheel_build_py310:
    <<: *wheel-job
    if: ${{ env.WHEEL_BUILD == 'true' }}
    env:
      <<: *wheel-env
      PYTHON_VERSION: "3.10"
    steps: *wheel-steps

  wheel_build_py311:
    <<: *wheel-job
    if: ${{ env.WHEEL_BUILD == 'true' }}
    env:
      <<: *wheel-env
      PYTHON_VERSION: "3.11"
    steps: *wheel-steps

  wheel_build_py312:
    <<: *wheel-job
    if: ${{ env.WHEEL_BUILD == 'true' }}
    env:
      <<: *wheel-env
      PYTHON_VERSION: "3.12"
    steps: *wheel-steps

  wheel_build_py313:
    <<: *wheel-job
    if: ${{ env.WHEEL_BUILD == 'true' }}
    continue-on-error: true
    env:
      <<: *wheel-env
      PYTHON_VERSION: "3.13"
    steps: *wheel-steps
