name: PR build

on:
  pull_request:
    branches:
      - master
      - replica-master
      
  workflow_dispatch:
    inputs:
      large-runner:
        description: "New runner to use for failing build"
        required: true
        default: "ubuntu-24.04-ppc64le-2xlarge-p10"
        type: choice
        options:
          - ubuntu-24.04-ppc64le-2xlarge-p10
          - ubuntu-24.04-ppc64le-4xlarge-p10
      pr_number:
        description: "PR number of failing build"
        required: true
        type: string

run-name: >
  ${{ github.event_name == 'workflow_dispatch'
      && format('Retriggered build on {0} for PR {1}', inputs.large-runner, inputs.pr_number)
      || github.event.pull_request.title }}

jobs:

  check_changes:
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-24.04-ppc64le-p10' || inputs.large-runner }}
    outputs:
      should_build: ${{ steps.filter.outputs.should_build }}
      changed_files: ${{ steps.filter.outputs.changed_files }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Fix workspace permissions
        run: sudo chown -R $USER:$USER .

      - name: Check for relevant file changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Workflow dispatch - proceeding with build"
            exit 0
          fi

          git fetch origin ${{ github.base_ref }}
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          echo "Changed files:"
          echo "$CHANGED_FILES"

          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          RELEVANT_CHANGES=$(echo "$CHANGED_FILES" | grep -E '(build_info\.json|\.sh$|Dockerfile)' | grep -vE '^(gha-script|process_bom|script|templates|travis-currency-ymls|travis-ymls)/' || true)

          if [ -n "$RELEVANT_CHANGES" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "✅ Found relevant changes:"
            echo "$RELEVANT_CHANGES"
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "⏭️ Skipping PR build CI check - no changes related to build_info.json, build scripts (.sh), or Dockerfile"
          fi

  build_info:
    needs: check_changes
    if: needs.check_changes.outputs.should_build == 'true'
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-24.04-ppc64le-p10' || inputs.large-runner }}
    outputs:
      wheel_build_enabled: ${{ steps.set_flags.outputs.wheel_build_enabled }}
      has_sh_changes: ${{ steps.set_flags.outputs.has_sh_changes }}
      has_dockerfile_changes: ${{ steps.set_flags.outputs.has_dockerfile_changes }}
      docker_build_enabled: ${{ steps.set_flags.outputs.docker_build_enabled }}
      build_package_enabled: ${{ steps.set_flags.outputs.build_package_enabled }}

    steps:
      - name: Checkout code (Pull Request)
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Checkout code (Workflow Dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ inputs.pr_number }}/head

      - name: Debug - Check user and workspace ownership
        run: |
          echo "Current user: $USER"
          echo "Current user ID: $(id -u)"
          echo "Current group ID: $(id -g)"
          echo "Workspace directory: $(pwd)"
          echo "Workspace ownership:"
          ls -la . | head -20
          echo "gha-script directory ownership:"
          ls -la ./gha-script | head -10

      - name: Fix workspace permissions
        run: sudo chown -R $USER:$USER .

      - name: Install required packages
        run: |
          sudo apt update -y
          sudo apt-get install -y file jq

      - name: Install Python dependencies
        run: |
          pip3 install --force-reinstall -v "requests==2.31.0"
          pip3 install --upgrade docker

      - name: Set PR number
        run: echo "PR_NUMBER=${{ github.event.pull_request.number || inputs.pr_number }}" >> $GITHUB_ENV

      - name: Run validate_builds.py script with live logs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 -u gha-script/validate_builds.py ${PR_NUMBER:-false} 2>&1 | tee build_log
          my_pid_status=${PIPESTATUS[0]}

          if [ "$my_pid_status" -ne 0 ]; then
              echo "Script failed for PR #${PR_NUMBER}"
              echo "::group::Validation Logs"
              tail -200 build_log
              echo "::endgroup::"
              exit 1
          else
              echo "Script completed successfully for PR #${PR_NUMBER}"
          fi

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }} --depth=1

      - name: Locate and parse build_info.json
        run: |
          CHANGED_FILES="${{ needs.check_changes.outputs.changed_files }}"

          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            git fetch origin ${{ github.base_ref }} --depth=1
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          fi

          BUILD_INFO_FILE=$(echo "$CHANGED_FILES" | grep 'build_info.json' | head -n 1)

          if [ -z "$BUILD_INFO_FILE" ]; then
              echo "No build_info.json modified, trying to detect from changed files..."
              PACKAGE_DIR=$(echo "$CHANGED_FILES" | head -n 1 | cut -d'/' -f1-2)
              BUILD_INFO_FILE="$PACKAGE_DIR/build_info.json"
              if [ ! -f "$BUILD_INFO_FILE" ]; then
                  echo "Could not locate build_info.json!"
                  exit 1
              fi
              echo "Using fallback build_info: $BUILD_INFO_FILE"
          fi

          PACKAGE_NAME=$(jq -r '.package_name // ""' $BUILD_INFO_FILE)
          VERSION=$(jq -r '.version // ""' $BUILD_INFO_FILE)

          echo "BUILD_INFO_FILE=$BUILD_INFO_FILE" >> $GITHUB_ENV
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "CHANGED_FILES<<EOF" >> $GITHUB_ENV
          echo "$CHANGED_FILES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Read build_info.json
        run: |
          sudo chown -R $USER:$USER .
          chmod +x ./gha-script/read_buildinfo.sh
          bash ./gha-script/read_buildinfo.sh

      # ... (set_flags, Create scanner-env.sh, Archive, Upload — identical to main repo)
